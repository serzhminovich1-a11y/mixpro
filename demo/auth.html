<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIXPRO — Войти</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;600;700;800&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<!-- Подключаем файл со стилями -->
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<!-- Ссылка исправлена на index.html -->
<a href="index.html" class="logo">MIX<span>PRO</span></a>
<div class="card">
  <div class="tabs">
    <button class="tab on" id="tabLogin" onclick="showTab('login')">Войти</button>
    <button class="tab" id="tabReg" onclick="showTab('reg')">Регистрация</button>
  </div>

  <!-- LOGIN -->
  <div id="formLogin">
    <div class="field"><label>Email</label><input type="email" id="loginEmail" placeholder="your@email.com"></div>
    <div class="field"><label>Пароль</label><input type="password" id="loginPass" placeholder="••••••••"></div>
    <button class="submit" id="loginBtn" onclick="doLogin()">Войти</button>
    <div class="msg" id="loginMsg"></div>
  </div>

  <!-- REGISTER -->
  <div id="formReg" style="display:none">
    <div class="field"><label>Никнейм</label><input type="text" id="regName" placeholder="soundengineer99" maxlength="24"></div>
    <div class="field"><label>Email</label><input type="email" id="regEmail" placeholder="your@email.com"></div>
    <div class="field"><label>Пароль</label><input type="password" id="regPass" placeholder="Минимум 6 символов"></div>
    <button class="submit" id="regBtn" onclick="doRegister()">Создать аккаунт</button>
    <div class="msg" id="regMsg"></div>
  </div>
</div>

<!-- Библиотека Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<!-- Подключаем файл с логикой авторизации -->
<script src="js/auth.js"></script>
</body>
</html>
