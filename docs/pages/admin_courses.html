<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIXPRO — Управление курсами</title>
<link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400..900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/courses.css">
</head>
<body>
<nav>
  <a href="../index.html" class="logo">MIX<span>PRO</span></a>
  <div class="nav-links">
    <a href="courses.html" class="nav-btn">Курсы</a>
    <a href="profile.html" class="nav-btn">Профиль</a>
    <button class="nav-btn danger" onclick="logout()">Выйти</button>
  </div>
</nav>

<div class="wrap">
  <div id="loading" class="loading">Проверяем доступ...</div>

  <div id="noAccess" class="no-access" style="display:none">
    <div class="big">🔒</div>
    <div>Эта страница только для тех, у кого подтверждён опыт (VERIFIED_PRO/MENTOR/ADMIN)</div>
    <a href="verify.html" class="nav-btn" style="margin-top:16px;display:inline-block">Подать заявку на подтверждение →</a>
  </div>

  <div id="content" style="display:none">
    <div>
      <div class="sec-h">Новый курс</div>
    </div>
    <form class="form-card" id="courseForm">
      <div class="field">
        <label for="cTitle">Название</label>
        <input type="text" id="cTitle" required maxlength="120" placeholder="Например: Основы эквализации">
      </div>
      <div class="field">
        <label for="cDesc">Описание</label>
        <textarea id="cDesc" placeholder="О чём курс"></textarea>
      </div>
      <div class="form-row">
        <div class="field">
          <label for="cCategory">Категория</label>
          <input type="text" id="cCategory" placeholder="Например: EQ, мастеринг">
        </div>
        <div class="field">
          <label for="cDifficulty">Уровень</label>
          <select id="cDifficulty">
            <option value="beginner">Новичок</option>
            <option value="intermediate">Средний</option>
            <option value="advanced">Продвинутый</option>
          </select>
        </div>
      </div>
      <button type="submit" class="submit-btn" id="courseBtn">Создать курс</button>
      <div class="form-status" id="courseStatus"></div>
    </form>

    <div>
      <div class="sec-h">Курсы и уроки</div>
    </div>
    <div id="coursesAdminList" style="display:flex;flex-direction:column;gap:16px"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tus-js-client@4/dist/tus.min.js"></script>
<script src="../js/admin_courses.js"></script>
</body>
</html>
