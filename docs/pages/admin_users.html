<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIXPRO — Все пользователи</title>
<link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400..900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/courses.css">
<link rel="stylesheet" href="../css/admin_users.css">
</head>
<body>
<nav>
  <a href="../index.html" class="logo">MIX<span>PRO</span></a>
  <div class="nav-links">
    <a href="admin_courses.html" class="nav-btn">Управление курсами</a>
    <a href="verify_review.html" class="nav-btn">Проверка заявок</a>
    <a href="profile.html" class="nav-btn">Профиль</a>
    <button class="nav-btn danger" onclick="logout()">Выйти</button>
  </div>
</nav>

<div class="wrap">
  <div id="loading" class="loading">Проверяем доступ...</div>

  <div id="noAccess" class="no-access" style="display:none">
    <div class="big">🔒</div>
    <div>Эта страница только для ADMIN</div>
  </div>

  <div id="content" style="display:none">
    <div>
      <div class="sec-h">Все пользователи</div>
      <div class="page-sub">Полный доступ: меняй роль, XP и статус верификации любому</div>
    </div>

    <div class="au-toolbar">
      <input type="text" id="searchInput" placeholder="Поиск по нику...">
      <div class="au-count" id="userCount"></div>
    </div>

    <div class="au-table-wrap">
      <table class="au-table">
        <thead>
          <tr>
            <th>Пользователь</th>
            <th>Роль</th>
            <th>XP</th>
            <th>Верификация</th>
            <th>С нами с</th>
          </tr>
        </thead>
        <tbody id="usersBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/admin_users.js"></script>
</body>
</html>
