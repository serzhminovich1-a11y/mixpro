<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIXPRO — Курсы</title>
<link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400..900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/tokens.css">
<link rel="stylesheet" href="../css/themes.css">
<script>
(function(){
  try {
    var t = localStorage.getItem("mixpro_theme");
    if (t && t !== "default") document.documentElement.setAttribute("data-theme", t);
  } catch(e){}
})();
</script>
<link rel="stylesheet" href="../css/courses.css">
<link rel="stylesheet" href="../css/animations.css">
<link rel="stylesheet" href="../css/notifications.css">
<link rel="stylesheet" href="../css/rich_text.css">
</head>
<body>
<nav>
  <a href="../index.html" class="logo">MIX<span>PRO</span></a>
  <div class="nav-links">
    <a href="../index.html" class="nav-btn">Главная</a>
    <a href="feed.html" class="nav-btn">Лента</a>
    <a href="courses.html" class="nav-btn current">Курсы</a>
    <a href="forum.html" class="nav-btn">Форум</a>
    <a href="../index.html#trainers" class="nav-btn">Тренажёры</a>
    <a href="leaderboard.html" class="nav-btn">Рейтинг</a>
    <a href="portfolio.html" class="nav-btn">Портфолио</a>
  </div>
  <div class="nav-links">
    <a href="verify.html" class="nav-btn" id="verifyLink" style="display:none">Стать автором курсов</a>
    <a href="admin.html" class="nav-btn accent" id="adminLink" style="display:none">Админ</a>
    <div id="pmMount"></div>
    <div id="notifMount"></div>
    <a href="profile.html" class="nav-btn primary">Профиль</a>
    <button class="nav-btn danger" onclick="logout()">Выйти</button>
  </div>
</nav>

<div class="wrap">
  <div id="loading" class="loading">Загружаем курсы...</div>

  <!-- Course grid view -->
  <div id="listView" style="display:none">
    <div>
      <div class="sec-h">Курсы</div>
      <div class="page-sub">Выбери курс, чтобы увидеть уроки</div>
    </div>
    <div class="course-grid" id="courseGrid"></div>
  </div>

  <!-- Single course / lessons view -->
  <div id="courseView" style="display:none">
    <a href="courses.html" class="back-link">← Все курсы</a>
    <div>
      <div class="sec-h" id="courseTitle">—</div>
      <div class="page-sub" id="courseDesc"></div>
    </div>
    <div class="cert-banner" id="certBanner" style="display:none"></div>
    <div class="lesson-list" id="lessonList"></div>

    <div id="assignmentsSection" style="display:none">
      <div class="sec-h">Задания</div>
      <div class="assignment-list" id="assignmentList"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/animations.js"></script>
<script src="../js/notifications.js"></script>
<script src="../js/content_filter.js"></script>
<script src="../js/rich_text.js"></script>
<script src="../js/ban_gate.js"></script>
<script src="../js/courses.js"></script>
</body>
</html>
