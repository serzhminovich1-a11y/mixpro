<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIXPRO — Лента</title>
<link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400..900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/tokens.css">
<link rel="stylesheet" href="../css/themes.css">
<script>
(function(){
  try {
    var t = localStorage.getItem("mixpro_theme");
    if (t && t !== "default") document.documentElement.setAttribute("data-theme", t);
  } catch(e){}
})();
</script>
<link rel="stylesheet" href="../css/feed.css">
<link rel="stylesheet" href="../css/animations.css">
<link rel="stylesheet" href="../css/waveform_player.css">
<link rel="stylesheet" href="../css/audio_analysis.css">
<link rel="stylesheet" href="../css/rich_text.css">
<link rel="stylesheet" href="../css/notifications.css">
</head>
<body>
<nav>
  <a href="../index.html" class="logo"><span class="logo-name">MIXPRO</span><span class="logo-sub">Engineering</span></a>
  <div class="nav-links">
    <a href="../index.html" class="nav-btn">Главная</a>
    <a href="feed.html" class="nav-btn current">Лента</a>
  </div>
  <div class="nav-links">
    <div id="pmMount"></div>
    <div id="notifMount"></div>
    <a href="profile.html" class="nav-btn primary">Профиль</a>
    <div class="nav-burger-wrap">
      <button type="button" class="nav-burger-btn" id="burgerBtn" onclick="toggleBurgerMenu()" title="Меню" aria-label="Меню">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
      </button>
      <div class="nav-burger-panel" id="burgerPanel">
        <div class="burger-section-title">Разделы</div>
        <a href="courses.html" class="burger-link">Курсы</a>
        <a href="forum.html" class="burger-link">Форум</a>
        <a href="../index.html#trainers" class="burger-link">Тренажёры</a>
        <a href="../index.html#glossary" class="burger-link">Библиотека</a>
        <a href="leaderboard.html" class="burger-link">Рейтинг</a>
        <a href="portfolio.html" class="burger-link">Портфолио</a>
        <div class="burger-divider"></div>
        <a href="admin.html" class="burger-link accent" id="adminLink" style="display:none">Админ</a>
        <button type="button" class="burger-link danger" onclick="closeBurgerMenu();logout()">Выйти</button>
      </div>
    </div>
  </div>
</nav>

<div class="wrap">
  <div id="loading" class="loading">Загружаем ленту...</div>

  <div id="content" style="display:none">
    <form class="card composer" id="composerForm">
      <div class="rt-toolbar">
        <button type="button" class="rt-btn" data-cmd="bold" data-tip="Жирный" aria-label="Жирный"><b>Ж</b></button>
        <button type="button" class="rt-btn" data-cmd="italic" data-tip="Курсив" aria-label="Курсив"><i>К</i></button>
        <button type="button" class="rt-btn" data-cmd="underline" data-tip="Подчёркнутый" aria-label="Подчёркнутый"><u>Ч</u></button>
        <button type="button" class="rt-btn" data-cmd="strikeThrough" data-tip="Зачёркнутый" aria-label="Зачёркнутый"><s>З</s></button>
        <span class="rt-sep"></span>
        <select class="rt-select rt-font" title="Шрифт">
          <option value="">Шрифт</option>
          <option value="Golos Text">Обычный</option>
          <option value="JetBrains Mono">Моно</option>
          <option value="Georgia">С засечками</option>
        </select>
        <select class="rt-select rt-size" title="Размер">
          <option value="">Размер</option>
          <option value="2">Мелкий</option>
          <option value="3">Обычный</option>
          <option value="5">Крупный</option>
          <option value="7">Огромный</option>
        </select>
      </div>
      <div id="postContent" class="rt-editable" contenteditable="true" data-placeholder="Поделись мыслями о миксе, спроси совета…"></div>
      <div class="attach-preview" id="attachPreview">
        <span id="attachName"></span>
        <button type="button" id="attachRemove"><svg class="feed-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
      </div>
      <input type="file" id="attachInput" style="display:none">
      <div class="composer-actions">
        <div class="composer-tools">
          <button type="button" class="tool-btn" id="micBtn" title="Голосовое сообщение"><svg class="feed-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg></button>
          <button type="button" class="tool-btn" id="attachBtn" title="Прикрепить видео/файл"><svg class="feed-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg></button>
        </div>
        <button type="submit" class="btn-primary" id="postBtn">Опубликовать</button>
      </div>
      <div class="composer-status" id="composerStatus"></div>
    </form>

    <div class="sec-h">Лента</div>
    <div id="postsList" style="display:flex;flex-direction:column;gap:16px"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/animations.js"></script>
<script src="../js/page_transition.js"></script>
<script src="../js/waveform_player.js"></script>
<script src="../js/audio_analysis.js"></script>
<script src="../js/content_filter.js"></script>
<script src="../js/rich_text.js"></script>
<script src="../js/notifications.js"></script>
<script src="../js/pm_inbox.js"></script>
<script src="../js/ban_gate.js"></script>
<script src="../js/nav_burger.js"></script>
<script src="../js/feed.js"></script>
</body>
</html>
