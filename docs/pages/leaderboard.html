<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIXPRO — Рейтинг</title>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<meta name="description" content="Глобальный рейтинг игроков MIXPRO — лучшие результаты в играх для тренировки слуха.">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400..700&family=DM+Sans:wght@400..800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/tokens.css">
<link rel="stylesheet" href="../css/themes.css">
<script>
(function(){
  try {
    var t = localStorage.getItem("mixpro_theme");
    if (t && t !== "default") document.documentElement.setAttribute("data-theme", t);
  } catch(e){}
})();
</script>
<link rel="stylesheet" href="../css/leaderboard.css">
<link rel="stylesheet" href="../css/animations.css">
<link rel="stylesheet" href="../css/notifications.css">
</head>
<body>
<nav>
 <div class="nav-inner">
  <a href="../index.html" class="logo"><span class="logo-name">MIXPRO</span><span class="logo-sub">Engineering</span></a>
  <div class="nav-links">
    <a href="../index.html" class="nav-btn">Главная</a>
    <a href="leaderboard.html" class="nav-btn current">Рейтинг</a>
  </div>
  <div class="nav-links" id="accountLinks" style="display:none">
    <div id="pmMount"></div>
    <div id="notifMount"></div>
    <a href="profile.html" class="nav-btn primary" id="profileLink">Профиль</a>
    <div class="nav-burger-wrap">
      <button type="button" class="nav-burger-btn" id="burgerBtn" onclick="toggleBurgerMenu()" title="Меню" aria-label="Меню">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
      </button>
      <div class="nav-burger-panel" id="burgerPanel">
        <div class="burger-section-title">Разделы</div>
        <a href="feed.html" class="burger-link">Лента</a>
        <a href="courses.html" class="burger-link">Курсы</a>
        <a href="forum.html" class="burger-link">Форум</a>
        <a href="marketplace.html" class="burger-link">Барахолка</a>
        <a href="../index.html#trainers" class="burger-link">Тренажёры</a>
        <a href="../index.html#glossary" class="burger-link">Библиотека</a>
        <a href="portfolio.html" class="burger-link">Портфолио</a>
        <div class="burger-divider"></div>
        <a href="admin.html" class="burger-link accent" id="adminLink" style="display:none">Админ</a>
        <button type="button" class="burger-link danger" onclick="closeBurgerMenu();logout()">Выйти</button>
      </div>
    </div>
  </div>
 </div>
</nav>

<div class="wrap">
  <div class="page-title">Глобальный рейтинг</div>
  <div class="page-sub">Лучшие результаты за все время среди всех игроков</div>

  <div class="filter-row">
    <button class="f-btn on" onclick="setGame('all',this)">Все игры</button>
    <button class="f-btn" onclick="setGame('peak_master',this)">Peak Master</button>
    <button class="f-btn" onclick="setGame('pan_trainer',this)">Pan Trainer</button>
    <button class="f-btn" onclick="setGame('db_king',this)">dB King</button>
    <button class="f-btn" onclick="setGame('reverb_wizard',this)">Reverb Wizard</button>
    <button class="f-btn" onclick="setGame('dr_compressor',this)">Dr. Compressor</button>
  </div>

  <div class="filter-row">
    <button class="f-btn on" id="diffAll" onclick="setDiff('all',this)">Все режимы</button>
    <button class="f-btn" onclick="setDiff('easy',this)">Легко</button>
    <button class="f-btn" onclick="setDiff('medium',this)">Средне</button>
    <button class="f-btn" onclick="setDiff('hard',this)">Сложно</button>
  </div>

  <div class="your-rank" id="yourRank">
    <div>
      <div class="your-rank-label">Твоё место</div>
      <div class="your-rank-val" id="yourRankVal">—</div>
    </div>
    <div>
      <div class="your-rank-label">Твой лучший результат</div>
      <div class="your-rank-val" id="yourScore">0</div>
    </div>
    <div>
      <div class="your-rank-label">Никнейм</div>
      <div class="your-rank-val" id="yourName">—</div>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead><tr><th>#</th><th>Игрок</th><th>Результат</th><th>Точность</th><th>Раундов</th><th>Режим</th></tr></thead>
      <tbody id="lbBody"><tr><td colspan="6" class="loading">Загружаем рейтинг...</td></tr></tbody>
    </table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/animations.js"></script>
<script src="../js/page_transition.js"></script>
<script src="../js/notifications.js"></script>
<script src="../js/pm_inbox.js"></script>
<script src="../js/ban_gate.js"></script>
<script src="../js/nav_burger.js"></script>
<script src="../js/leaderboard.js"></script>
</body>
</html>
