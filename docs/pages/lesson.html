<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIXPRO — Урок</title>
<link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400..900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/courses.css">
<link rel="stylesheet" href="../css/animations.css">
</head>
<body>
<nav>
  <a href="../index.html" class="logo">MIX<span>PRO</span></a>
  <div class="nav-links">
    <a href="profile.html" class="nav-btn">Профиль</a>
    <button class="nav-btn danger" onclick="logout()">Выйти</button>
  </div>
</nav>

<div class="wrap">
  <div id="loading" class="loading">Загружаем урок...</div>

  <div id="content" style="display:none">
    <a href="#" id="backLink" class="back-link">← К курсу</a>

    <div class="lesson-head">
      <div class="course-name" id="courseName">—</div>
      <h1 id="lessonTitle">—</h1>
    </div>

    <div id="playerBlock" class="player-wrap" style="display:none">
      <video id="video" controls controlsList="nodownload noremoteplayback" disablePictureInPicture oncontextmenu="return false"></video>
      <div class="watermark" id="watermark"></div>
    </div>

    <div id="noVideo" class="empty" style="display:none">Материал к этому уроку скоро появится</div>

    <button class="complete-btn" id="completeBtn">Отметить урок пройденным</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/animations.js"></script>
<script src="../js/lesson.js"></script>
</body>
</html>
