<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIXPRO — Портфолио</title>
<link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400..900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/tokens.css">
<link rel="stylesheet" href="../css/themes.css">
<script>
(function(){
  try {
    var t = localStorage.getItem("mixpro_theme");
    if (t && t !== "default") document.documentElement.setAttribute("data-theme", t);
  } catch(e){}
})();
</script>
<link rel="stylesheet" href="../css/portfolio.css">
<link rel="stylesheet" href="../css/animations.css">
<link rel="stylesheet" href="../css/waveform_player.css">
<link rel="stylesheet" href="../css/audio_analysis.css">
<link rel="stylesheet" href="../css/project_feedback.css">
<link rel="stylesheet" href="../css/notifications.css">
</head>
<body>
<nav>
  <a href="../index.html" class="logo">MIX<span>PRO</span></a>
  <div class="nav-links">
    <a href="../index.html" class="nav-btn">Главная</a>
    <a href="feed.html" class="nav-btn">Лента</a>
    <a href="courses.html" class="nav-btn">Курсы</a>
    <a href="../index.html#trainers" class="nav-btn">Тренажёры</a>
    <a href="leaderboard.html" class="nav-btn">Рейтинг</a>
    <a href="portfolio.html" class="nav-btn current">Портфолио</a>
  </div>
  <div class="nav-links">
    <a href="admin.html" class="nav-btn accent" id="adminLink" style="display:none">Админ</a>
    <div id="notifMount"></div>
    <a href="profile.html" class="nav-btn primary">Профиль</a>
    <button class="nav-btn danger" onclick="logout()">Выйти</button>
  </div>
</nav>

<div class="wrap">
  <div id="loading" class="loading">Загружаем портфолио...</div>

  <div id="content" style="display:none">

    <!-- Hero -->
    <div class="port-hero">
      <div class="port-hero-main">
        <div class="port-avatar" id="portAvatar"></div>
        <div class="port-hero-info">
          <div class="port-name-row">
            <h1 id="portName">—</h1>
            <span class="port-pro-badge" id="portProBadge" style="display:none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3.85 8.62a4 4 0 0 1 4.78-4.77 4 4 0 0 1 6.74 0 4 4 0 0 1 4.78 4.78 4 4 0 0 1 0 6.74 4 4 0 0 1-4.77 4.78 4 4 0 0 1-6.75 0 4 4 0 0 1-4.78-4.77 4 4 0 0 1 0-6.76Z"/><path d="m9 12 2 2 4-4"/></svg><span id="portProBadgeText">Проверенный специалист</span></span>
          </div>
          <div class="port-tagline" id="portTagline">Загружай свои миксы — они появятся здесь и в профиле</div>
        </div>
      </div>
      <button type="button" class="port-share-btn" id="shareBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/></svg>
        <span>Поделиться</span>
      </button>
    </div>

    <!-- Stats -->
    <div class="port-stats" id="portStats">
      <div class="port-stat"><div class="port-stat-num" id="statTracks">0</div><div class="port-stat-lbl">Треков</div></div>
      <div class="port-stat"><div class="port-stat-num" id="statReactions">0</div><div class="port-stat-lbl">Реакций</div></div>
      <div class="port-stat"><div class="port-stat-num" id="statRating">—</div><div class="port-stat-lbl">Средняя оценка</div></div>
      <div class="port-stat"><div class="port-stat-num" id="statReviews">0</div><div class="port-stat-lbl">Разборов от наставников</div></div>
    </div>

    <form class="upload-card" id="uploadForm">
      <div class="field">
        <label for="fTitle">Название трека</label>
        <input type="text" id="fTitle" placeholder="Например: Мой первый микс" required maxlength="120">
      </div>
      <div class="field">
        <label for="fFile">Аудиофайл (MP3, WAV)</label>
        <input type="file" id="fFile" accept="audio/*" required>
      </div>
      <div class="field">
        <label for="fCover">Обложка (необязательно)</label>
        <div class="cover-pick">
          <div class="cover-pick-preview" id="coverPreview"></div>
          <div class="cover-pick-body">
            <input type="file" id="fCover" accept="image/*">
            <div class="cover-pick-hint">Квадратная картинка смотрится лучше всего</div>
          </div>
        </div>
      </div>
      <button type="submit" class="upload-btn" id="uploadBtn">Загрузить</button>
      <div class="upload-progress" id="uploadProgress" style="display:none"><div class="upload-progress-fill" id="uploadProgressFill"></div></div>
      <div class="upload-status" id="uploadStatus"></div>
    </form>

    <div>
      <div class="sec-h with-link">
        <span id="tracksHeading">Мои проекты</span>
        <div class="proj-sort" id="projSort">
          <button type="button" class="sort-btn active" data-sort="new">Новые</button>
          <button type="button" class="sort-btn" data-sort="top">Топ по оценке</button>
          <button type="button" class="sort-btn" data-sort="hot">Больше реакций</button>
        </div>
      </div>
      <div class="proj-grid" id="projGrid"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/animations.js"></script>
<script src="../js/waveform_player.js"></script>
<script src="../js/audio_analysis.js"></script>
<script src="../js/content_filter.js"></script>
<script src="../js/project_feedback.js"></script>
<script src="../js/notifications.js"></script>
<script src="../js/portfolio.js"></script>
</body>
</html>
