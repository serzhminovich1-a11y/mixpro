<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIXPRO — Тема</title>
<link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400..900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/tokens.css">
<link rel="stylesheet" href="../css/themes.css">
<script>
(function(){
  try {
    var t = localStorage.getItem("mixpro_theme");
    if (t && t !== "default") document.documentElement.setAttribute("data-theme", t);
  } catch(e){}
})();
</script>
<link rel="stylesheet" href="../css/forum.css">
<link rel="stylesheet" href="../css/animations.css">
<link rel="stylesheet" href="../css/rich_text.css">
<link rel="stylesheet" href="../css/notifications.css">
</head>
<body>
<nav>
  <a href="../index.html" class="logo"><span class="logo-name">MIXPRO</span><span class="logo-sub">Engineering</span></a>
  <div class="nav-links">
    <a href="../index.html" class="nav-btn">Главная</a>
    <a href="forum.html" class="nav-btn current">Форум</a>
  </div>
  <div class="nav-links">
    <div id="pmMount"></div>
    <div id="notifMount"></div>
    <a href="profile.html" class="nav-btn primary">Профиль</a>
    <div class="nav-burger-wrap">
      <button type="button" class="nav-burger-btn" id="burgerBtn" onclick="toggleBurgerMenu()" title="Меню" aria-label="Меню">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
      </button>
      <div class="nav-burger-panel" id="burgerPanel">
        <div class="burger-section-title">Разделы</div>
        <a href="feed.html" class="burger-link">Лента</a>
        <a href="courses.html" class="burger-link">Курсы</a>
        <a href="marketplace.html" class="burger-link">Барахолка</a>
        <a href="../index.html#trainers" class="burger-link">Тренажёры</a>
        <a href="leaderboard.html" class="burger-link">Рейтинг</a>
        <a href="portfolio.html" class="burger-link">Портфолио</a>
        <div class="burger-divider"></div>
        <a href="admin.html" class="burger-link" id="adminLink" style="display:none">Админ</a>
        <button type="button" class="burger-link danger" onclick="closeBurgerMenu();logout()">Выйти</button>
      </div>
    </div>
  </div>
</nav>

<div class="wrap">
  <div id="loading" class="loading">Загружаем тему...</div>

  <div id="content" style="display:none">
    <a href="forum.html" class="back-link" id="backLink">← Форум</a>

    <div class="forum-thread-header">
      <div class="forum-thread-header-title" id="threadTitle">—</div>
      <div class="forum-thread-header-actions" id="threadActions"></div>
    </div>

    <div id="postsList" style="display:flex;flex-direction:column;gap:14px"></div>

    <form class="card forum-reply-composer" id="replyForm">
      <div class="forum-quote-preview" id="quotePreview">
        <div id="quotePreviewText"></div>
        <button type="button" id="quoteCancelBtn" title="Убрать цитату">✕</button>
      </div>
      <div id="replyEditorMount"></div>
      <div class="composer-actions">
        <div class="composer-status" id="replyStatus"></div>
        <button type="submit" class="btn-primary" id="replySubmit">Ответить</button>
      </div>
    </form>
    <div class="empty" id="lockedNotice" style="display:none">Тема закрыта — новые ответы недоступны</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/animations.js"></script>
<script src="../js/content_filter.js"></script>
<script src="../js/rich_text.js"></script>
<script src="../js/notifications.js"></script>
<script src="../js/pm_inbox.js"></script>
<script src="../js/ban_gate.js"></script>
<script src="../js/nav_burger.js"></script>
<script src="../js/thread.js"></script>
</body>
</html>
